<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 32 32" fill="none">
  <title>SquadcoEscrow — logo mark (dark background)</title>
  <!-- Coin-like rounded square: the brand mark for an escrow vault -->
  <rect x="1" y="1" width="30" height="30" rx="9" fill="#FDF8EF"/>
  <!-- Stylised S: two interlocking curves form the escrow knot -->
  <path d="M21.5 11.2c-1-1.6-2.9-2.6-5.1-2.6-3.1 0-5.4 1.7-5.4 4.1 0 2.1 1.6 3.2 4.6 3.8l1.8.3c2.5.5 3.6 1.3 3.6 2.7 0 1.6-1.8 2.7-4.5 2.7-2.4 0-4.3-.9-5.4-2.5"
        stroke="#0A0A0A" stroke-width="2.4" stroke-linecap="round" fill="none"/>
  <!-- Escrow indicator: the coral dot signals "funds locked" -->
  <circle cx="24.5" cy="8.5" r="2.6" fill="#E04848" stroke="#FDF8EF" stroke-width="1.2"/>
</svg>
